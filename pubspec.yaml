name: angelesur
description: Sistema POS para farmacia - AngeleSur
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Navegación
  go_router: ^13.0.0

  # Estado
  flutter_riverpod: ^2.5.1

  # Escritorio
  window_manager: ^0.3.8

  # Base de datos local
  sqflite_common_ffi: ^2.3.3

  # Utilidades
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  file_picker: ^8.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sistema/
    - assets/productos/